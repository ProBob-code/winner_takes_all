.3s ease; }.modal-card.active { transform:scale(1); }h2 { color:white;margin:0 0 12px 0;font-size:22px; }p { color:#94a3b8;margin:0 0 24px 0;line-height:1.5;font-size:15px; }.modal-actions { display:flex;gap:12px; }.modal-btn { flex:1;padding:12px;border-radius:12px;font-weight:bold;font-size:14px;cursor:pointer;transition:all 0.2s;border:none; }.btn-cancel { background:rgba(255,255,255,0.05);color:white;border:1px solid rgba(255,255,255,0.1); }.btn-confirm { background:linear-gradient(135deg, #8b5cf6, #7c3aed);color:white;box-shadow:0 4px 15px rgba(139, 92, 246, 0.4); }.modal-btn:hover { opacity:0.9;transform:translateY(-1px); }</style></head><body><button onclick="showExitModal()" class="back-btn">⬅</button><div id="modal-overlay"><div class="modal-card"><h2>Exit Match?</h2><p>Ready to head back to the Gaming Hub? Your current match progress will be lost.</p><div class="modal-actions"><button onclick="hideExitModal()" class="modal-btn btn-cancel">Stay & Play</button><button onclick="window.location.href='/games'" class="modal-btn btn-confirm">Yes, Exit</button></div></div></div><script>function showExitModal(){ const overlay = document.getElementById('modal-overlay'); overlay.style.display = 'flex'; setTimeout(() => overlay.firstElementChild.classList.add('active'), 10); }function hideExitModal(){ const overlay = document.getElementById('modal-overlay'); overlay.firstElementChild.classList.remove('active'); setTimeout(() => overlay.style.display = 'none', 300); }</script><center><div id="mygame"></div></center></body></html>
