name = "winnertakesall"
main = "src/index.ts"
compatibility_date = "2024-09-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "winner-takes-all-db"
database_id = "4cba52ba-c7bf-45ae-811f-c6d37efe6e98"

[[kv_namespaces]]
binding = "SESSIONS"
id = "wta-sessions"

[durable_objects]
bindings = [
  { name = "GAME_ROOMS", class_name = "GameRoom" }
]

[[migrations]]
tag = "v1"
new_classes = ["GameRoom"]
